# docs.goblin.st static mdBook docs site (/opt/goblin/www-docs)
# Source: git.us-ea.st/GRIN/goblin-docs → mdbook build → this webroot.
server {
    listen 167.17.77.3:80;
    listen [::]:80;
    server_name docs.goblin.st;
    location /.well-known/acme-challenge/ { root /var/www/acme-challenge; }
    location / { return 301 https://docs.goblin.st$request_uri; }
}

server {
    listen 167.17.77.3:443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.goblin.st;

    ssl_certificate     /etc/letsencrypt/live/docs.goblin.st/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.goblin.st/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    access_log /var/log/nginx/docs.goblin.st.access.log;
    error_log  /var/log/nginx/docs.goblin.st.error.log;

    root /opt/goblin/www-docs;
    index index.html;

    # Never serve VCS metadata.
    location ~ /\.git { deny all; return 404; }

    # Long-cache the fingerprinted assets mdBook emits.
    location ~* \.(css|js|woff2?|ttf|svg|png|jpe?g|gif)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ $uri.html =404; }
}
