# nginx vhost for docs.goblin.st — static mdBook output.
#
# The docs are built from the goblin-docs repo into /opt/goblin/www-docs by the
# deploy hook (git pull → mdbook build). This server just serves those files.
#
# Install: copy to the server's nginx sites dir, then provision TLS with
#   certbot --nginx -d docs.goblin.st
# (certbot rewrites the :80 block to redirect and adds the :443 block; the
# manual :443 block below is what that produces, shown for reference).

server {
    listen 80;
    listen [::]:80;
    server_name docs.goblin.st;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name docs.goblin.st;

    ssl_certificate     /etc/letsencrypt/live/docs.goblin.st/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.goblin.st/privkey.pem;

    root /opt/goblin/www-docs;
    index index.html;

    # Never serve the git working tree if the docroot ever holds one.
    location ~ /\.(git|env) { deny all; }

    # Long-cache the fingerprinted assets mdBook emits (…-<hash>.css/js/woff2).
    location ~* \.(css|js|woff2?|ttf|svg|png|jpg|jpeg|gif)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
